# Local profile: Supabase Postgres, Flyway migrations, no Kafka, no OAuth2 required
# Before starting, set your DB password:
#   $env:DB_PASSWORD="your-supabase-password"

# PostgreSQL — Supabase direct connection (port 5432, SSL required)
spring.datasource.url=jdbc:postgresql://db.tgzxmcfgcunodrbzppby.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Supabase free tier allows ~20 connections — keep pool small
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Flyway — V2-V6 were intentionally deleted; ignore them in validation
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=*:missing

# Redis (Docker container port-forwarded to host)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=1000ms
spring.data.redis.connect-timeout=1000ms

# JWT
jwt.secret=Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLXN0cmluZy1pbi1wcm9kdWN0aW9uLW1pbi0yNTYtYml0cy1sb25n
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Cookie — Secure=false for plain HTTP in local dev
app.cookie.secure=false

# Rate limiting
app.rate-limit.max-requests=10
app.rate-limit.window-seconds=60
app.rate-limit.trusted-proxies=127.0.0.1,::1

# Kafka — disabled for local dev
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Google OAuth2 — placeholder (login via email/password works; Google login needs real credentials)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend
frontend.customer-url=http://localhost:3000

# H2 console disabled (using postgres)
spring.h2.console.enabled=false

# Logging
logging.level.com.stitchit=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
