spring.datasource.url=jdbc:h2:mem:stitchitdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway in dev profile since H2 ddl-auto=create-drop manages schema
spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret for dev
jwt.secret=Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLXN0cmluZy1pbi1wcm9kdWN0aW9uLW1pbi0yNTYtYml0cy1sb25n
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
