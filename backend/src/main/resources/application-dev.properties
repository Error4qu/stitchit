spring.datasource.url=jdbc:h2:mem:stitchitdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway in dev — H2 create-drop handles schema
spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLXN0cmluZy1pbi1wcm9kdWN0aW9uLW1pbi0yNTYtYml0cy1sb25n
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Cookie — Secure=false for plain HTTP in local dev
app.cookie.secure=false

# Rate limiting
app.rate-limit.max-requests=10
app.rate-limit.window-seconds=60
app.rate-limit.trusted-proxies=127.0.0.1,::1

# Redis — fail gracefully if not running locally
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=500ms
spring.data.redis.connect-timeout=500ms

# Kafka — disable auto-start in dev to avoid startup failure
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Google OAuth2 — set real values via env vars; left empty here so OAuth2 login is disabled in dev
# To enable: GOOGLE_CLIENT_ID=xxx GOOGLE_CLIENT_SECRET=xxx mvn spring-boot:run -Pdev
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend URLs
frontend.customer-url=${FRONTEND_CUSTOMER_URL:http://localhost:3000}

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
