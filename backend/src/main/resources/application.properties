spring.profiles.active=dev
spring.application.name=stitchit-backend

# Flyway defaults
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA performance — OSIV off so DB connections are released as soon as the
# transaction ends instead of being held for the whole HTTP request;
# batch fetching collapses N+1 lazy loads into IN-clause batches
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=25

# Graceful shutdown — in-flight requests finish before the pod dies
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Response compression for JSON payloads
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024

# Actuator — expose only health + metrics over HTTP (secured in SecurityConfig)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
