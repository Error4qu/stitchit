spring.profiles.active=prod

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Cookie — Secure=true enforces HTTPS-only in production
app.cookie.secure=true

# Rate limiting — set TRUSTED_PROXY_IPS to your nginx/load-balancer container IP(s)
app.rate-limit.max-requests=10
app.rate-limit.window-seconds=60
app.rate-limit.trusted-proxies=${TRUSTED_PROXY_IPS:127.0.0.1}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend
frontend.customer-url=${FRONTEND_CUSTOMER_URL:https://stitchit.app}

# CORS — comma-separated list of allowed origins
cors.origins=${CORS_ORIGINS:https://stitchit.app}

# Logging
logging.level.com.stitchit=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
